<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Factura de Agua</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/uikit.min.css" />
  <script src="js/uikit.min.js"></script>
  <script src="js/uikit-icons.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }
    label, input {
      display: block;
      margin: 10px 0;
    }
    button {
      margin-top: 10px;
      margin-right: 10px;
    }
    .result {
      color: #000000;
      margin-top: 5px;
      padding: 5px;
      border-radius: 5px;
      width: 387px;
    }

    table {
      width: 100%;
      border-collapse: collapse; 

    th, td {
      padding: 8px;
      border-left: 1px solid #ccc; 
    }

    th:first-child,
    td:first-child {
      border-left: none;
    }

    tr:nth-child(odd) {
      background-color: #ffffff;
    }
    
    tr:nth-child(even) {
      background-color: #176ead;
      color: white;
    }


    td:nth-child(2),
    th:nth-child(2) {
      text-align: right;
    }
  </style>
</head>
<body onload="cargarDatos()">
  <h1>Factura de Agua</h1>
    <label for="miSelect">Nombre del cliente:</label>
    <select id="miSelect" onchange="searchClient(this.value)">
      <option value="">Cargando opciones...</option>
    </select>  

  <label>Tarifa m3:
    <input type="number" id="tarifa" value="30"/>
  </label>

  <label>Fecha (día/mes/año):
    <input type="date" id="fecha" value=""/>
  </label>

  <label>Lectura anterior:
    <input type="number" id="lecturaAnterior" />
  </label>

  <label>Lectura actual:
    <input type="number" id="lecturaActual" />
  </label>

  <label>Saldo anterior:
    <input type="number" id="saldoAnterior" value="0"/>
  </label>

  <button onclick="calcular()">Calcular y mostrar factura</button>
  <button onclick="generarImagen()">Generar Imagen PNG</button>
  

  <div class="result" id="resultado"></div>

  <script src="controller.js"></script>
</body>
</html>
